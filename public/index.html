<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 灵感日报</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/newspaper.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="#feeds" class="nav-brand">AI 灵感日报</a>
      <div class="nav-links">
        <a href="#feeds" class="nav-link" data-route="feeds">今日资讯</a>
        <a href="#bookmarks" class="nav-link" data-route="bookmarks">灵感库</a>
        <a href="#report" class="nav-link" data-route="report">今日日报</a>
      </div>
    </div>
  </nav>

  <main id="app" class="app-main"></main>

  <!-- Tag selector modal -->
  <div id="tag-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-label="收藏文章">
      <h3 class="modal-title">收藏文章</h3>
      <p class="modal-article-title" id="modal-article-title"></p>
      <div class="tag-group">
        <!-- Populated dynamically by renderTagCheckboxes() -->
      </div>
      <textarea id="modal-note" class="modal-note" placeholder="备注（可选，最多500字）" maxlength="500" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn btn-outline" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-confirm">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/feeds.js"></script>
  <script src="/js/bookmarks.js"></script>
  <script src="/js/report.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
